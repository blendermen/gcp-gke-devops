name: CI/CD Pipeline to GCP (GKE + Artifact Registry)

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # 🔥 REQUIRED for OIDC

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 1. Authenticate to GCP via OIDC
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 2. Setup gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 3. Install GKE auth plugin
      - name: Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet

      # 4. Enable plugin
      - name: Configure kubectl auth
        run: |
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> $GITHUB_ENV

        # 5. Get GKE credentials
      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials moja-zupa-gke \
            --region europe-central2-a \
            --project ${{ secrets.GCP_PROJECT_ID }}

      # 6. Configure Docker auth for Artifact Registry
      - name: Docker auth
        run: gcloud auth configure-docker europe-central2-docker.pkg.dev

      # 7. Build backend
      - name: Build backend image
        run: |
          docker build -t europe-central2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/moja-zupa-repo/backend:${{ github.sha }} -f backend/backend.Dockerfile ./backend

      # 8. Build frontend
      - name: Build frontend image
        run: |
          docker build -t europe-central2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/moja-zupa-repo/frontend:${{ github.sha }} -f frontend/frontend.Dockerfile ./frontend

      # 9. Push images
      - name: Push images
        run: |
          docker push europe-central2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/moja-zupa-repo/backend:${{ github.sha }}
          docker push europe-central2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/moja-zupa-repo/frontend:${{ github.sha }}

      # 10. Deploy to Kubernetes
      - name: Deploy to GKE
        run: |
          sed -i "s|backend:latest|backend:${{ github.sha }}|g" gcp-deployment.yaml
          sed -i "s|frontend:latest|frontend:${{ github.sha }}|g" gcp-deployment.yaml
          kubectl apply -f gcp-deployment.yaml
